{% extends 'ubs/base.html' %}

{% block titulo %}Detalhes do Dependente{% endblock %}

{% block corpo %}
<h2>Dependente</h2>

<p><strong>Responsável:</strong> {{ dependente.responsavel }}</p>
<p><strong>Dependente:</strong> {{ dependente.dependente }}</p>
<p><strong>Parentesco:</strong> {{ dependente.parentesco }}</p>

<a href="{% url 'update_dependente' dependente.id %}">
    <button style="
        padding: 10px;
        background-color: rgb(30, 51, 239);
        color: white;
        border: none;
        border-radius: 5px;
        ">
            Editar
        </button>
</a>
{% endblock %}
