{% extends 'ubs/base.html' %}

{% block titulo %}Lista de Medicamentos{% endblock %}

{% block corpo %}
<h2>Lista de Medicamentos</h2>

{% if medications %}
    <ul>
        {% for medication in medications %}
            <li>
                <a href="{% url 'detail_medication' medication.id %}">
                    {{ medication }}
                </a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Nenhum medicamento encontrado.</p>
{% endif %}

<hr>

<a href="{% url 'create_medication' %}">
    <button style="
        padding: 10px;
        background-color: rgb(30, 51, 239);
        color: white;
        border: none;
        border-radius: 5px;
    ">
        Adicionar Medicamento
    </button>
</a>

{% endblock %}
