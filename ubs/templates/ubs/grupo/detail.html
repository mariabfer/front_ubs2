{% extends 'ubs/base.html' %}

{% block titulo %}Detalhes do Grupo{% endblock %}

{% block corpo %}
<h2>Grupo Vulnerável</h2>

<p><strong>Nome:</strong> {{ grupo.get_nome_grupo_display }}</p>
<p><strong>Peso:</strong> {{ grupo.peso_prioridade }}</p>
<p><strong>Descrição:</strong> {{ grupo.descricao }}</p>

<a href="{% url 'update_grupo' grupo.id %}">Editar</a>
{% endblock %}
