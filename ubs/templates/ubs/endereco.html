{% extends 'ubs/base.html' %}

{% block titulo %}Endereço Individual{% endblock %}

{% block corpo %}
    <h1>Endereço</h1>
    
    <p>Rua: {{ endereco.street }}</p>
    <p>Número: {{ endereco.number }}</p>
    <p>Bairro: {{ endereco.neigh }}</p>
    <p>Cidade: {{ endereco.city }}</p>
    <p>Estado: {{ endereco.state }}</p>
    <p>Cep: {{ endereco.cep }}</p>
{% endblock %}
