{% extends 'ubs/base.html' %}

{% block titulo %}Detalhes do Foco{% endblock %}

{% block corpo %}
<h2>Foco de Prioridade</h2>

<p><strong>Vacina:</strong> {{ foco.vaccine }}</p>
<p><strong>Grupo:</strong> {{ foco.grupo_vulneravel }}</p>
<p><strong>Ocupação:</strong> {{ foco.ocupacao }}</p>

<a href="{% url 'update_foco' foco.id %}"> <button style="
        padding: 10px;
        background-color: rgb(30, 51, 239);
        color: white;
        border: none;
        border-radius: 5px;
        ">
            Editar
        </button>
    </a>
{% endblock %}
